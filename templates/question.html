{{define "content"}}
    <div id="bg">
        <img src="/images/{{.Picture}}" srcset="/images/mobile/{{.Picture}} 780w, /images/{{.Picture}} 1920w" alt="{{.Short}}">
    </div>
    <a href="/about">
        <img class="about" src="/images/about50.png" alt="About">
    </a>
    <div class="container">
        {{if .Previous}}
        <div class="previousrow">
            <div id="dial" data-pct="0" class="dial" title="{{.PreviousStats}}">
                <svg id="svg" width="200" height="200" viewPort="0 0 100 100" version="1.1" xmlns="http://www.w3.org/2000/svg">
                    <circle r="90" cx="100" cy="100" fill="transparent" stroke-dasharray="565.48"></circle>
                    <circle id="bar" r="90" cx="100" cy="100" fill="transparent" stroke-dasharray="565.48"></circle>
                </svg>
            </div>
            <div class="previous">
                <h5 class="previoustext">{{.PreviousValue}}% of people answered YES to the {{.Previous}} question.</h5>
            </div>
        </div>
        {{end}}
        <div class="row">
            <div class="two.columns column" style="margin-top: 5%; margin-bottom: 5%;">
                <h2>{{.Short}}</h2>
                <br>
                <h4>{{.Question}}</h4>
                <br>
                <form method="post" action="/">
                    <input type="hidden" name="question" value="{{.Id}}">
                    <input type="hidden" name="csrf_token" value="{{.CsrfToken}}">
                    <button class="button button-no" type="submit" name="answer" value="no">No</button>
                    <button class="button button-yes" type="submit" name="answer" value="yes">Yes</button>
                </form>
            </div>
        </div>
    </div>
    {{if .PreviousValue}}
    <script>
    (function() {
        var dial = document.getElementById("dial");
        var bar = document.getElementById("bar");
        if (!dial || !bar) return;
        var val = {{.PreviousValue}};
        if (val < 0) val = 0;
        if (val > 100) val = 100;
        var radius = parseFloat(bar.getAttribute("r")) || 0;
        var c = Math.PI * (radius * 2);
        var pct = ((100 - val) / 100) * c;
        requestAnimationFrame(function() {
            bar.style.strokeDashoffset = pct + "px";
            dial.setAttribute("data-pct", val);
        });
    })();
    </script>
    {{end}}
{{end}}
